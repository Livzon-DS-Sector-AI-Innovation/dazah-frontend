services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_BASE_URL=${API_BASE_URL:-http://dazah-backend-app-1:8000}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - .:/app
      - /app/node_modules
      - next-cache:/app/.next
    networks:
      - backend
    command: pnpm dev --webpack
    restart: unless-stopped

networks:
  backend:
    external: true
    name: dazah-backend_default

volumes:
  next-cache:
