services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=${API_BASE_URL:-http://dazah-backend-app-1:8000}
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    external: true
    name: dazah-backend_default
